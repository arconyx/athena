name: "Build with nix"

on:
  push:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        # I would like if there was a ubuntu-latest-arm but alas
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - run: nix build -L
