name: "Build with nix"

on:
  push:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        # I would like if there was a ubuntu-latest-arm but alas
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: nix-community/cache-nix-action@v7
        with:
          # Cache key has been ordered with the value likely to change most frequently at the end
          # So that we can fallback by matching on prefixes
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}-${{ hashFiles('**/Cargo.lock') }}
          # If there's no cache hit, restore a cache by one of these prefixes
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}-
            nix-${{ runner.os }}-
      - run: nix build -L
